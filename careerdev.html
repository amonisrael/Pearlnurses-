<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PearlNurses | Uganda's Nursing Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* GLOBAL STYLES */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; transition: 0.3s; }
        :root { 
            --primary: #0056b3; 
            --accent: #00a8e8; 
            --bg: #ffffff; 
            --text: #222222; 
            --border: #eeeeee; 
        }
        
        body { background-color: var(--bg); color: var(--text); line-height: 1.5; }

        /* HEADER */
        header { background: var(--primary); padding: 12px 0; position: sticky; top: 0; z-index: 1000; }
        .header-container { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 0 20px; max-width: 1200px; margin: 0 auto; }
        .logo { grid-column: 2; font-size: 1.5rem; font-weight: 800; color: white; text-decoration: none; letter-spacing: -0.5px; }

        .header-right { display: flex; justify-content: flex-end; gap: 15px; }
        .btn-icon { background: none; border: none; color: white; cursor: pointer; font-size: 1.2rem; padding: 5px; }

        /* SEARCH BAR */
        #search-container { display: none; background: white; padding: 15px; border-bottom: 1px solid var(--border); }
        #search-container.active { display: block; }
        #search-input { width: 100%; max-width: 800px; margin: 0 auto; display: block; padding: 12px; border: 1px solid var(--border); border-radius: 25px; outline: none; }

        /* NAVIGATION MENU */
        .nav-links { display: none; list-style: none; position: absolute; top: 100%; left: 0; width: 100%; background: #e9ecef; border-bottom: 3px solid var(--primary); padding: 10px 0; text-align: center; box-shadow: 0 10px 15px rgba(0,0,0,0.05); }
        .nav-links.active { display: block; }
        .nav-links li { padding: 12px; }
        .nav-links a { color: var(--primary); text-decoration: none; font-weight: 600; cursor: pointer; display: block; }

        /* FOOTER */
        footer { background: #121212; color: #ffffff; padding: 40px 20px; margin-top: 50px; border-top: 1px solid var(--border); }
        .footer-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 30px; max-width: 1200px; margin: 0 auto; }
        .footer-col h4 { color: var(--primary); margin-bottom: 12px; font-size: 0.85rem; text-transform: uppercase; }
        .footer-col a { color: #555; text-decoration: none; display: block; margin: 8px 0; font-size: 0.85rem; cursor: pointer; }
        #backToTop {
    display: none; 
    position: fixed; 
    bottom: 20px; 
    right: 20px; 
    z-index: 99; 
    border: none; 
    outline: none; 
    background-color: var(--primary); 
    color: white; 
    cursor: pointer; 
    padding: 15px; 
    border-radius: 50%; 
    width: 50px;
    height: 50px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

#backToTop:hover {
    background-color: var(--accent);
    transform: translateY(-3px);
}

    </style>
</head>
<body>

   <header>
        <div class="header-container">
            <div class="header-left">
                <button class="btn-icon" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
            </div>
            <a href="index.html" class="logo">PearlNurses</a>
            <div class="header-right">
                <button class="btn-icon" onclick="toggleSearch()"><i class="fas fa-search"></i></button>
            </div>
            <ul class="nav-links" id="nav-menu">
                <li><a href="uganda.html">Nursing in Uganda</a></li>
                <li><a href="schoolguide.html">School Guide</a></li>
                <li><a href="jobs.html">JOBS</a></li>
                 <li><a href="equip.html">Equipment & Reviews</a></li>
                <li><a href="tools.html">Calculators</a></li>
                <li><a onclick="openModal('aboutModal')">About Us</a></li>
            </ul>
        </div>
        <div id="search-container">
            <input type="text" id="search-input" placeholder="Search..." onkeyup="filterPosts()">
        </div>
    </header>

   <footer>
        <div class="footer-grid">
            <div class="footer-col">
                <h4 style="color:var(--primary)">PearlNurses</h4>
                <p style="color:#555; font-size:0.8rem">Empowering Uganda's healthcare backbone.</p>
                <div style="margin-top:15px">
                    <a href="https://x.com/pearlnurses" target="_blank" style="color:var(--accent);"><i class="fab fa-x-twitter"></i> Follow on X</a>
                </div>
            </div>
            <div class="footer-col">
                <h4>Support</h4>
                <a onclick="openModal('aboutModal')">About Us</a>
                <a onclick="openModal('contactModal')">Contact Us</a>
                <a href="privatepolicy.html">Privacy Policy</a>
            </div>
            <div class="footer-col">
                <p style="color:#999; font-size:0.75rem; margin-top:20px">&copy; 2024 PearlNurses. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script>
        const SHEET_ID = '1ZA8Lxxw4aFBebxlrPpJx5FvEyB_VdoG5Ob8D0LYiIr0';

        function toggleMenu() { document.getElementById('nav-menu').classList.toggle('active'); }
        function toggleSearch() { 
            const sc = document.getElementById('search-container');
            sc.classList.toggle('active');
            if(sc.classList.contains('active')) document.getElementById('search-input').focus();
        }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function filterPosts() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const items = document.querySelectorAll('.grid-item');
            items.forEach(item => {
                const text = item.querySelector('h3').innerText.toLowerCase();
                item.style.display = text.includes(query) ? 'flex' : 'none';
            });
        }

        async function loadData() {
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Posts`;
            try {
                const response = await fetch(url);
                const text = await response.text();
                const data = JSON.parse(text.substring(47).slice(0, -2)).table.rows;
                
                const newsGrid = document.getElementById('newsGrid');
                const trendingGrid = document.getElementById('trendingGrid');

                data.forEach(row => {
                    if (!row.c[0]) return;
                    const title = row.c[0].v;
                    const cat = row.c[1]?.v || "General";
                    const img = row.c[3]?.v || "https://via.placeholder.com/300";
                    const link = row.c[4]?.v || "#";

                    const cardHTML = `
                        <a href="${link}" class="grid-item">
                            <div class="image-box"><img src="${img}" alt="${title}" loading="lazy"></div>
                            <div class="card-content">
                                <span class="category-tag">${cat}</span>
                                <h3>${title}</h3>
                            </div>
                        </a>`;

                    if (cat.toLowerCase() === 'news' || cat.toLowerCase() === 'featured') {
                        newsGrid.innerHTML += cardHTML;
                    } else {
                        trendingGrid.innerHTML += cardHTML;
                    }
                });
            } catch (e) { console.error("Data load error:", e); }
        }

        window.onload = loadData;
        window.onscroll = function() {
    const btn = document.getElementById("backToTop");
    if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) {
        btn.style.display = "block";
    } else {
        btn.style.display = "none";
    }
};

function scrollToTop() {
    window.scrollTo({
        top: 0,
        behavior: 'smooth'
    });
}

    </script>
<button id="backToTop" onclick="scrollToTop()" title="Go to top">
    <i class="fas fa-arrow-up"></i>
</button>

</body>
</html>
